spring.application.name=delivery-api

# Configuração do servidor
server.port=8080
# Configuração do H2 Database
spring.datasource.url=jdbc:h2:mem:deliverydb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# Console H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
# Configurações de desenvolvimento
spring.devtools.restart.enabled=true
# Configurações específicas para JDK 21
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
logging.level.org.springframework.web=DEBUG
# Defina o caminho do endpoint que serve o JSON da documentação da openapi
springdoc.api-docs.path=/api-docs
# Defina o caminho do endpoint que serve a interface do Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
# Organiza os métodos da UI do Swagger por tipo HTTP (GET, POST, etc.)
springdoc.swagger-ui.operationsSorter=method
# ===== LOGGING =====
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.transaction=DEBUG
# ===== CONFIGURAÇÕES ADICIONAIS =====




